<style>
  body { overflow-x: hidden; }
  
  /* BLOG HERO */
  .blog-hero {
    padding: 10rem 0 5rem;
    background: linear-gradient(135deg, rgba(12,15,20,0.98) 0%, rgba(8,10,14,1) 100%);
    position: relative;
    overflow: hidden;
  }
  .blog-hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 30% 20%, rgba(0,194,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255,0,92,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .blog-hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .blog-hero h1 {
    font-size: 3.5rem;
    font-weight: 900;
    margin-bottom: 1rem;
  }
  .blog-hero h1 span {
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .blog-hero p {
    font-size: 1.2rem;
    color: var(--color-text-secondary);
    max-width: 600px;
    margin: 0 auto;
  }
  
  /* BLOG GRID */
  .blog-section {
    padding: 5rem 0;
    background: var(--color-bg-dark);
  }
  .blog-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
  }
  .blog-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s ease;
    display: flex;
    flex-direction: column;
  }
  .blog-card:hover {
    transform: translateY(-8px);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .blog-card-image {
    height: 240px;
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    position: relative;
    overflow: hidden;
  }
  .blog-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .blog-card:hover .blog-card-image img {
    transform: scale(1.05);
  }
  .blog-card-category {
    position: absolute;
    top: 1rem;
    left: 1rem;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 0.4rem 0.8rem;
    border-radius: 50px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: white;
  }
  .blog-card-content {
    padding: 1.5rem;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  .blog-card-date {
    font-size: 0.85rem;
    color: var(--color-text-muted);
    margin-bottom: 0.75rem;
  }
  .blog-card h2 {
    font-size: 1.4rem;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .blog-card p {
    font-size: 0.95rem;
    color: var(--color-text-secondary);
    line-height: 1.6;
    margin-bottom: 1rem;
    flex-grow: 1;
  }
  .blog-card-link {
    color: var(--color-secondary);
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: gap 0.2s ease;
  }
  .blog-card-link:hover {
    gap: 0.8rem;
  }
  
  @media (max-width: 768px) {
    .blog-grid {
      grid-template-columns: 1fr;
    }
    .blog-hero h1 {
      font-size: 2.5rem;
    }
  }
</style>
