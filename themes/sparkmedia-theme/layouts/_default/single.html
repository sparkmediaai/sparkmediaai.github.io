{{ define "main" }}
<article class="container py-3">
    <header class="text-center mb-3">
        <h1 style="font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem;">{{ .Title }}</h1>
        {{ if .Params.subtitle }}
        <p style="font-size: 1.25rem; color: var(--primary);">{{ .Params.subtitle }}</p>
        {{ end }}
    </header>
    
    <div class="content" style="max-width: 800px; margin: 0 auto;">
        {{ .Content }}
    </div>
</article>
{{ end }}
