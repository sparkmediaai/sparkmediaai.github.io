<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formMessage = document.getElementById('formMessage');
    formMessage.style.display = 'block';
    formMessage.style.backgroundColor = 'var(--light)';
    formMessage.style.color = 'var(--accent)';
    formMessage.textContent = 'Thank you for your message! In a production environment, this would send an email to our team. For now, please email hello@sparkmedia.ai directly.';
    
    // Clear form
    this.reset();
    
    // Scroll to message
    formMessage.scrollIntoView({ behavior: 'smooth' });
});
</script>
