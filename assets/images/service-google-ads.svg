<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="serviceGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF005C" />
      <stop offset="100%" stop-color="#7A5CFF" />
    </linearGradient>
    
    <filter id="serviceGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="#1A1D23" />
  
  <!-- Main icon container -->
  <g transform="translate(100, 80)">
    <!-- Search bar base -->
    <rect x="0" y="0" width="200" height="60" rx="10" fill="#242830" />
    
    <!-- Search icon -->
    <circle cx="30" cy="30" r="15" fill="url(#serviceGradient1)" />
    <line x1="40" y1="40" x2="55" y2="55" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    
    <!-- Search text -->
    <text x="70" y="38" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">
      Google Ads
    </text>
    
    <!-- Stats bars -->
    <g transform="translate(0, 100)">
      <!-- Bar 1 -->
      <rect x="0" y="0" width="200" height="20" rx="5" fill="#242830" />
      <rect x="5" y="5" width="120" height="10" rx="3" fill="#00C2FF" />
      <text x="130" y="15" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">
        65% CTR
      </text>
      
      <!-- Bar 2 -->
      <rect x="0" y="40" width="200" height="20" rx="5" fill="#242830" />
      <rect x="5" y="45" width="160" height="10" rx="3" fill="#FF005C" />
      <text x="170" y="55" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">
        82% Conv
      </text>
      
      <!-- Bar 3 -->
      <rect x="0" y="80" width="200" height="20" rx="5" fill="#242830" />
      <rect x="5" y="85" width="140" height="10" rx="3" fill="#7A5CFF" />
      <text x="150" y="95" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">
        73% ROI
      </text>
    </g>
    
    <!-- Floating elements -->
    <circle cx="180" cy="30" r="8" fill="#00C2FF" opacity="0.8">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="20" cy="180" r="6" fill="#FF005C" opacity="0.8">
      <animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Decorative border -->
  <rect width="400" height="400" rx="20" fill="none" stroke="url(#serviceGradient1)" stroke-width="2" stroke-dasharray="10,5" />
</svg>