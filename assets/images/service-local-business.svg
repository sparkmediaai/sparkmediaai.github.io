<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="localGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF005C" />
      <stop offset="100%" stop-color="#00C2FF" />
    </linearGradient>
    
    <radialGradient id="mapGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7A5CFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7A5CFF" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="#1A1D23" />
  
  <!-- Map visualization -->
  <g transform="translate(50, 50)">
    <!-- Map base -->
    <rect width="300" height="250" rx="10" fill="#242830" />
    
    <!-- Map grid -->
    <g stroke="#3A3F4A" stroke-width="1" stroke-opacity="0.5">
      <!-- Vertical lines -->
      <line x1="60" y1="0" x2="60" y2="250" />
      <line x1="120" y1="0" x2="120" y2="250" />
      <line x1="180" y1="0" x2="180" y2="250" />
      <line x1="240" y1="0" x2="240" y2="250" />
      
      <!-- Horizontal lines -->
      <line x1="0" y1="50" x2="300" y2="50" />
      <line x1="0" y1="100" x2="300" y2="100" />
      <line x1="0" y1="150" x2="300" y2="150" />
      <line x1="0" y1="200" x2="300" y2="200" />
    </g>
    
    <!-- Service area circles -->
    <g>
      <!-- Primary service area -->
      <circle cx="150" cy="125" r="40" fill="url(#mapGradient)" stroke="#FF005C" stroke-width="2" stroke-opacity="0.7">
        <animate attributeName="r" values="40;45;40" dur="4s" repeatCount="indefinite" />
      </circle>
      
      <!-- Secondary service areas -->
      <circle cx="80" cy="80" r="25" fill="#00C2FF" fill-opacity="0.2" stroke="#00C2FF" stroke-width="1.5" stroke-opacity="0.6" />
      <circle cx="220" cy="180" r="20" fill="#7A5CFF" fill-opacity="0.2" stroke="#7A5CFF" stroke-width="1.5" stroke-opacity="0.6" />
      <circle cx="100" cy="200" r="18" fill="#FF005C" fill-opacity="0.2" stroke="#FF005C" stroke-width="1.5" stroke-opacity="0.6" />
      <circle cx="200" cy="70" r="22" fill="#00C2FF" fill-opacity="0.2" stroke="#00C2FF" stroke-width="1.5" stroke-opacity="0.6" />
    </g>
    
    <!-- Business location markers -->
    <g>
      <!-- Main business -->
      <g transform="translate(150, 125)">
        <circle r="12" fill="url(#localGradient)" />
        <circle r="6" fill="#FFFFFF" />
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite" additive="sum" />
      </g>
      
      <!-- Satellite locations -->
      <g transform="translate(80, 80)">
        <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#00C2FF" opacity="0.8" />
        <text x="0" y="5" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">A</text>
      </g>
      
      <g transform="translate(220, 180)">
        <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#7A5CFF" opacity="0.8" />
        <text x="0" y="5" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">B</text>
      </g>
    </g>
    
    <!-- Connection lines -->
    <g stroke="url(#localGradient)" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="5,3">
      <line x1="150" y1="125" x2="80" y2="80" />
      <line x1="150" y1="125" x2="220" y2="180" />
      <line x1="150" y1="125" x2="100" y2="200" />
      <line x1="150" y1="125" x2="200" y2="70" />
    </g>
    
    <!-- Map labels -->
    <text x="150" y="280" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">
      Local Service Coverage
    </text>
    <text x="150" y="305" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#B8C1CC" text-anchor="middle">
      Targeted Google Ads by Location
    </text>
  </g>
  
  <!-- Animated elements -->
  <g>
    <!-- Pulsing dots along connection lines -->
    <circle cx="115" cy="102" r="3" fill="#FF005C">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="185" cy="152" r="3" fill="#00C2FF">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="125" cy="162" r="3" fill="#7A5CFF">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s" />
    </circle>
  </g>
  
  <!-- Decorative border -->
  <rect width="400" height="400" rx="20" fill="none" stroke="url(#localGradient)" stroke-width="2" />
</svg>