<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C2FF" />
      <stop offset="100%" stop-color="#7A5CFF" />
    </linearGradient>
    
    <filter id="aiGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="#1A1D23" />
  
  <!-- Main AI brain visualization -->
  <g transform="translate(100, 80)">
    <!-- Neural network nodes -->
    <g>
      <!-- Input layer -->
      <circle cx="20" cy="40" r="12" fill="#00C2FF" opacity="0.9" />
      <circle cx="20" cy="100" r="12" fill="#00C2FF" opacity="0.9" />
      <circle cx="20" cy="160" r="12" fill="#00C2FF" opacity="0.9" />
      
      <!-- Hidden layer -->
      <circle cx="100" cy="30" r="14" fill="#7A5CFF" opacity="0.9">
        <animate attributeName="r" values="14;16;14" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="100" cy="100" r="16" fill="#FF005C" opacity="0.9">
        <animate attributeName="r" values="16;18;16" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="100" cy="170" r="14" fill="#7A5CFF" opacity="0.9">
        <animate attributeName="r" values="14;16;14" dur="2.5s" repeatCount="indefinite" />
      </circle>
      
      <!-- Output layer -->
      <circle cx="180" cy="100" r="15" fill="url(#aiGradient)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite" />
      </circle>
    </g>
    
    <!-- Neural connections -->
    <g stroke-width="2" stroke-opacity="0.4">
      <!-- Input to Hidden -->
      <line x1="32" y1="40" x2="86" y2="30" stroke="#00C2FF" />
      <line x1="32" y1="40" x2="86" y2="100" stroke="#00C2FF" />
      <line x1="32" y1="40" x2="86" y2="170" stroke="#00C2FF" />
      
      <line x1="32" y1="100" x2="86" y2="30" stroke="#00C2FF" />
      <line x1="32" y1="100" x2="86" y2="100" stroke="#00C2FF" />
      <line x1="32" y1="100" x2="86" y2="170" stroke="#00C2FF" />
      
      <line x1="32" y1="160" x2="86" y2="30" stroke="#00C2FF" />
      <line x1="32" y1="160" x2="86" y2="100" stroke="#00C2FF" />
      <line x1="32" y1="160" x2="86" y2="170" stroke="#00C2FF" />
      
      <!-- Hidden to Output -->
      <line x1="114" y1="30" x2="165" y2="100" stroke="#7A5CFF" />
      <line x1="114" y1="100" x2="165" y2="100" stroke="#FF005C" />
      <line x1="114" y1="170" x2="165" y2="100" stroke="#7A5CFF" />
    </g>
    
    <!-- Data flow arrows -->
    <g>
      <!-- Input arrow -->
      <polygon points="0,100 10,95 10,105" fill="#00C2FF" />
      <line x1="10" y1="100" x2="20" y2="100" stroke="#00C2FF" stroke-width="2" />
      
      <!-- Output arrow -->
      <line x1="195" y1="100" x2="205" y2="100" stroke="url(#aiGradient)" stroke-width="2" />
      <polygon points="205,100 215,95 215,105" fill="url(#aiGradient)" />
    </g>
    
    <!-- Labels -->
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="start">
      Input Data
    </text>
    <text x="100" y="220" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">
      AI Processing
    </text>
    <text x="200" y="220" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="end">
      Optimized Output
    </text>
  </g>
  
  <!-- Animated particles -->
  <g>
    <circle cx="50" cy="350" r="4" fill="#00C2FF" opacity="0.6">
      <animate attributeName="cx" values="50;70;50" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="50" r="3" fill="#FF005C" opacity="0.6">
      <animate attributeName="cy" values="50;70;50" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="300" r="5" fill="#7A5CFF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Decorative border -->
  <rect width="400" height="400" rx="20" fill="none" stroke="url(#aiGradient)" stroke-width="2" stroke-dasharray="8,4" />
</svg>