<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF005C" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FF005C" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="chartGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="chartGradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A5CFF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#7A5CFF" stop-opacity="0.2" />
    </linearGradient>
    
    <filter id="chartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="500" fill="#0C0F14" />
  
  <!-- Chart container -->
  <g transform="translate(50, 50)">
    <!-- Chart background -->
    <rect width="700" height="350" rx="15" fill="#1A1D23" filter="url(#chartShadow)" />
    
    <!-- Chart title -->
    <text x="350" y="30" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">
      Performance Growth Metrics
    </text>
    <text x="350" y="55" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#B8C1CC" text-anchor="middle">
      12-Month Campaign Results
    </text>
    
    <!-- Chart grid -->
    <g stroke="#2D323D" stroke-width="1" stroke-opacity="0.6">
      <!-- Horizontal grid lines -->
      <line x1="80" y1="100" x2="680" y2="100" />
      <line x1="80" y1="150" x2="680" y2="150" />
      <line x1="80" y1="200" x2="680" y2="200" />
      <line x1="80" y1="250" x2="680" y2="250" />
      <line x1="80" y1="300" x2="680" y2="300" />
      
      <!-- Vertical grid lines (months) -->
      <line x1="140" y1="80" x2="140" y2="320" />
      <line x1="200" y1="80" x2="200" y2="320" />
      <line x1="260" y1="80" x2="260" y2="320" />
      <line x1="320" y1="80" x2="320" y2="320" />
      <line x1="380" y1="80" x2="380" y2="320" />
      <line x1="440" y1="80" x2="440" y2="320" />
      <line x1="500" y1="80" x2="500" y2="320" />
      <line x1="560" y1="80" x2="560" y2="320" />
      <line x1="620" y1="80" x2="620" y2="320" />
    </g>
    
    <!-- Y-axis labels -->
    <g font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A94A3" text-anchor="end">
      <text x="75" y="105">250%</text>
      <text x="75" y="155">200%</text>
      <text x="75" y="205">150%</text>
      <text x="75" y="255">100%</text>
      <text x="75" y="305">50%</text>
      <text x="75" y="325">0%</text>
    </g>
    
    <!-- X-axis labels (months) -->
    <g transform="translate(0, 330)" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#8A94A3" text-anchor="middle">
      <text x="140">Jan</text>
      <text x="200">Feb</text>
      <text x="260">Mar</text>
      <text x="320">Apr</text>
      <text x="380">May</text>
      <text x="440">Jun</text>
      <text x="500">Jul</text>
      <text x="560">Aug</text>
      <text x="620">Sep</text>
      <text x="680">Oct</text>
    </g>
    
    <!-- Bar chart data -->
    <g>
      <!-- Leads (pink bars) -->
      <rect x="120" y="220" width="40" height="100" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;100" dur="1s" fill="freeze" />
      </rect>
      <rect x="180" y="180" width="40" height="140" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;140" dur="1s" begin="0.1s" fill="freeze" />
      </rect>
      <rect x="240" y="150" width="40" height="170" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;170" dur="1s" begin="0.2s" fill="freeze" />
      </rect>
      <rect x="300" y="120" width="40" height="200" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;200" dur="1s" begin="0.3s" fill="freeze" />
      </rect>
      <rect x="360" y="100" width="40" height="220" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;220" dur="1s" begin="0.4s" fill="freeze" />
      </rect>
      <rect x="420" y="90" width="40" height="230" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;230" dur="1s" begin="0.5s" fill="freeze" />
      </rect>
      <rect x="480" y="80" width="40" height="240" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;240" dur="1s" begin="0.6s" fill="freeze" />
      </rect>
      <rect x="540" y="70" width="40" height="250" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;250" dur="1s" begin="0.7s" fill="freeze" />
      </rect>
      <rect x="600" y="60" width="40" height="260" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;260" dur="1s" begin="0.8s" fill="freeze" />
      </rect>
      <rect x="660" y="50" width="40" height="270" rx="3" fill="url(#chartGradient1)">
        <animate attributeName="height" values="0;270" dur="1s" begin="0.9s" fill="freeze" />
      </rect>
      
      <!-- Revenue (cyan line) -->
      <polyline points="140,300 200,280 260,250 320,220 380,200 440,180 500,160 560,140 620,120 680,100"
                fill="none" stroke="#00C2FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="2s" fill="freeze" />
      </polyline>
      
      <!-- ROI (purple line) -->
      <polyline points="140,280 200,260 260,230 320,200 380,170 440,150 500,130 560,110 620,90 680,70"
                fill="none" stroke="#7A5CFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="2s" begin="0.5s" fill="freeze" />
      </polyline>
    </g>
    
    <!-- Legend -->
    <g transform="translate(80, 370)">
      <rect width="200" height="60" rx="10" fill="#242830" opacity="0.9" />
      
      <g transform="translate(20, 20)">
        <!-- Leads legend -->
        <rect x="0" y="0" width="15" height="15" rx="3" fill="#FF005C" />
        <text x="25" y="12" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Leads Generated</text>
        
        <!-- Revenue legend -->
        <line x1="0" y1="30" x2="15" y2="30" stroke="#00C2FF" stroke-width="4" stroke-linecap="round" />
        <text x="25" y="32" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Revenue Growth</text>
        
        <!-- ROI legend -->
        <line x1="0" y1="45" x2="15" y2="45" stroke="#7A5CFF" stroke-width="4" stroke-linecap="round" />
        <text x="25" y="47" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">ROI Increase</text>
      </g>
    </g>
    
    <!-- Stats highlights -->
    <g transform="translate(450, 370)">
      <rect width="230" height="60" rx="10" fill="#242830" opacity="0.9" />
      
      <g transform="translate(15, 15)">
        <text x="0" y="15" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FF005C">+287%</text>
        <text x="60" y="15" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">Leads Growth</text>
        
        <text x="0" y="35" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#00C2FF">+312%</text>
        <text x="60" y="35" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">Revenue Increase</text>
        
        <text x="140" y="15" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#7A5CFF">4.8x</text>
        <text x="180" y="15" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#B8C1CC">Average ROI</text>
      </g>
    </g>
  </g>
  
  <!-- Animated elements -->
  <g>
    <!-- Floating data points -->
    <circle cx="400" cy="100" r="3" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="200" r="2" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="cx" values="500;510;500" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="300" r="4" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>