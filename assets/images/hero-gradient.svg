<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF005C" stop-opacity="0.8">
        <animate attributeName="stop-color" values="#FF005C;#00C2FF;#7A5CFF;#FF005C" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#00C2FF" stop-opacity="0.6">
        <animate attributeName="stop-color" values="#00C2FF;#7A5CFF;#FF005C;#00C2FF" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#7A5CFF" stop-opacity="0.4">
        <animate attributeName="stop-color" values="#7A5CFF;#FF005C;#00C2FF;#7A5CFF" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <radialGradient id="sphereGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF005C" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FF005C" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="800" height="600" fill="#0C0F14" />
  
  <!-- Main gradient orb -->
  <circle cx="400" cy="300" r="180" fill="url(#gradient1)" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="180;200;180" dur="8s" repeatCount="indefinite" />
  </circle>
  
  <!-- Data nodes -->
  <g>
    <circle cx="200" cy="150" r="12" fill="#00C2FF" opacity="0.8">
      <animate attributeName="cy" values="150;170;150" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="450" r="10" fill="#7A5CFF" opacity="0.8">
      <animate attributeName="cx" values="600;620;600" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="500" r="8" fill="#FF005C" opacity="0.8">
      <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="100" r="14" fill="#00C2FF" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Connection lines -->
  <g stroke-width="2" stroke-opacity="0.3">
    <line x1="200" y1="150" x2="400" y2="300" stroke="#00C2FF">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite" />
    </line>
    <line x1="600" y1="450" x2="400" y2="300" stroke="#7A5CFF">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="300" y1="500" x2="400" y2="300" stroke="#FF005C">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" />
    </line>
    <line x1="500" y1="100" x2="400" y2="300" stroke="#00C2FF">
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="6s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Floating particles -->
  <g>
    <circle cx="100" cy="80" r="3" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="cy" values="80;100;80" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="520" r="2" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="cx" values="700;720;700" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="400" r="4" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="200" r="3" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="cy" values="200;220;200" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>