<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF005C"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0C0F14" stroke="url(#iconGradient)" stroke-width="2"/>
  
  <!-- Spark icon -->
  <g transform="translate(25, 25) scale(0.5)">
    <path d="M40,40 L60,20 L80,40 L60,60 Z" fill="url(#iconGradient)" filter="url(#iconGlow)"/>
    
    <!-- Energy lines -->
    <g stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round">
      <line x1="60" y1="40" x2="60" y2="20"/>
      <line x1="60" y1="40" x2="80" y2="40"/>
      <line x1="60" y1="40" x2="60" y2="60"/>
      <line x1="60" y1="40" x2="40" y2="40"/>
    </g>
    
    <!-- Central dot -->
    <circle cx="60" cy="40" r="3" fill="#FFFFFF"/>
  </g>
  
  <!-- Text "S" for small sizes -->
  <text x="50" y="65" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" 
        text-anchor="middle" fill="url(#iconGradient)">S</text>
</svg>