<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF005C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="1"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF005C"/>
      <stop offset="50%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#FF005C"/>
    </linearGradient>
    
    <!-- Glow effect filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background (transparent for dark themes) -->
  <rect width="400" height="120" fill="transparent"/>
  
  <!-- Spark Icon -->
  <g transform="translate(20, 20)">
    <!-- Main spark shape -->
    <path d="M40,40 L60,20 L80,40 L60,60 Z" fill="url(#sparkGradient)" filter="url(#glow)"/>
    
    <!-- Energy lines radiating from center -->
    <g stroke="url(#sparkGradient)" stroke-width="2" stroke-linecap="round">
      <line x1="60" y1="40" x2="60" y2="20"/>
      <line x1="60" y1="40" x2="80" y2="40"/>
      <line x1="60" y1="40" x2="60" y2="60"/>
      <line x1="60" y1="40" x2="40" y2="40"/>
      
      <!-- Diagonal energy lines -->
      <line x1="60" y1="40" x2="70" y2="30"/>
      <line x1="60" y1="40" x2="70" y2="50"/>
      <line x1="60" y1="40" x2="50" y2="50"/>
      <line x1="60" y1="40" x2="50" y2="30"/>
    </g>
    
    <!-- Central dot -->
    <circle cx="60" cy="40" r="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Logo Text -->
  <g transform="translate(120, 30)">
    <!-- Spark text with gradient -->
    <text x="0" y="40" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#textGradient)">
      Spark
    </text>
    
    <!-- Media text (white) -->
    <text x="145" y="40" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">
      Media
    </text>
    
    <!-- .AI suffix with gradient -->
    <text x="290" y="40" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#textGradient)">
      .AI
    </text>
    
    <!-- Tagline -->
    <text x="0" y="75" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#B8C1CC">
      AI-Powered Marketing & Automation
    </text>
  </g>
</svg>